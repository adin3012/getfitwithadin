<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submissions Inbox — GetFitWithAdin</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --bg2: #111; --bg3: #181818;
      --border: #222; --accent: #f97316; --text: #f5f5f5;
      --muted: #888; --font: 'Inter', system-ui, sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: rgba(10,10,10,0.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10; padding: 16px 0;
    }
    .header-inner {
      max-width: 960px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; }
    .header-logo-box {
      width: 36px; height: 36px; background: var(--accent);
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-weight: 900; font-size: 9px; color: #000;
    }
    .header-logo span { font-weight: 800; font-size: 1rem; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    #statsBar { font-size: 0.82rem; color: var(--muted); }
    .btn-logout {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--muted); padding: 7px 14px; border-radius: 8px;
      font-size: 0.8rem; cursor: pointer; font-family: var(--font); transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

    main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
    .page-header { margin-bottom: 28px; }
    .page-header h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
    .page-header p  { font-size: 0.85rem; color: var(--muted); }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .stat-card .num { font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1; }
    .stat-card .lbl { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

    .search-bar {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); padding: 11px 16px; border-radius: 10px;
      font-size: 0.9rem; font-family: var(--font); outline: none;
      margin-bottom: 20px; transition: border-color 0.2s;
    }
    .search-bar:focus { border-color: var(--accent); }

    .empty { text-align: center; padding: 80px 24px; color: var(--muted); font-size: 0.95rem; }
    .empty-icon { font-size: 3rem; margin-bottom: 16px; }

    .submission-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; margin-bottom: 16px; transition: border-color 0.25s;
    }
    .submission-card:hover { border-color: rgba(249,115,22,0.35); }
    .card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .card-name { font-size: 1.1rem; font-weight: 700; }
    .card-email { font-size: 0.85rem; color: var(--accent); margin-top: 2px; }
    .card-time  { font-size: 0.75rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .card-fields {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px; margin-bottom: 16px;
    }
    .field-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
                   letter-spacing: 0.08em; color: var(--muted); margin-bottom: 3px; }
    .field-value { font-size: 0.88rem; color: var(--text); }
    .card-message {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px;
      font-size: 0.88rem; color: #c0c0c0; line-height: 1.6; margin-bottom: 16px;
    }
    .card-message .msg-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px;
    }
    .card-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .action-btn {
      padding: 7px 16px; border-radius: 8px; font-size: 0.82rem;
      font-weight: 700; font-family: var(--font); cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--border); background: var(--bg3); color: var(--text);
      transition: all 0.2s;
    }
    .btn-reply   { background: var(--accent); color: #000; border-color: var(--accent); }
    .btn-reply:hover { background: #fb923c; }
    .btn-wa      { background: #128c7e; color: #fff; border-color: #128c7e; }
    .btn-wa:hover { background: #25D366; border-color: #25D366; }
    .btn-view:hover  { border-color: var(--accent); color: var(--accent); }
    .btn-edit:hover  { border-color: #3b82f6; color: #3b82f6; }
    .btn-delete      { color: #ef4444; border-color: #ef4444; background: rgba(239,68,68,0.08); }
    .btn-delete:hover { background: #ef4444; color: #fff; }
    .badge-programme {
      display: inline-block; background: rgba(249,115,22,0.12);
      border: 1px solid rgba(249,115,22,0.25); color: var(--accent);
      font-size: 0.72rem; font-weight: 700; padding: 3px 10px;
      border-radius: 100px; letter-spacing: 0.04em; margin-left: 8px;
    }

    /* ---------- Modal ---------- */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 100;
      align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 20px; width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto; padding: 32px;
      position: relative;
    }
    .modal h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--muted); width: 32px; height: 32px; border-radius: 8px;
      cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
      font-family: var(--font); transition: all 0.2s;
    }
    .modal-close:hover { border-color: var(--accent); color: var(--accent); }
    .modal-field { margin-bottom: 16px; }
    .modal-field label {
      display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px;
    }
    .modal-field input, .modal-field textarea, .modal-field select {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px; border-radius: 8px;
      font-size: 0.9rem; font-family: var(--font); outline: none; transition: border-color 0.2s;
    }
    .modal-field input:focus, .modal-field textarea:focus, .modal-field select:focus { border-color: var(--accent); }
    .modal-field textarea { min-height: 80px; resize: vertical; }
    .modal-field .view-value {
      font-size: 0.9rem; color: var(--text); padding: 10px 14px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
      line-height: 1.5;
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
    .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .card-fields { grid-template-columns: 1fr 1fr; }
      .modal-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-logo">
      <div class="header-logo-box">GFWA</div>
      <span>Submissions Inbox</span>
    </div>
    <div class="header-right">
      <span id="statsBar"></span>
      <button class="btn-logout" onclick="window.location.href='https://getfitwithadin.onrender.com/auth/logout'">Sign Out</button>
    </div>
  </div>
</header>

<main>
  <div class="page-header">
    <h2>Coaching Inquiries</h2>
    <p>All form submissions — newest first</p>
  </div>
  <div class="stats-row" id="statsRow"></div>
  <input class="search-bar" type="text" id="searchInput"
         placeholder="Search by name, email, or goal…" oninput="renderSubmissions()" />
  <div id="listContainer"></div>
</main>

<!-- Preview Modal -->
<div class="modal-overlay" id="previewModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('previewModal')">✕</button>
    <h3>Submission Details</h3>
    <div id="previewContent"></div>
    <div class="modal-actions">
      <button class="action-btn btn-reply" id="previewReply">Reply via Email</button>
      <button class="action-btn btn-wa" id="previewWa">WhatsApp</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('editModal')">✕</button>
    <h3>Edit Submission</h3>
    <div class="modal-row">
      <div class="modal-field"><label>Name</label><input id="edit-name" /></div>
      <div class="modal-field"><label>Email</label><input id="edit-email" type="email" /></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>Weight (kg)</label><input id="edit-weight" type="number" /></div>
      <div class="modal-field"><label>Height (cm)</label><input id="edit-height" type="number" /></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>Age</label><input id="edit-age" type="number" /></div>
      <div class="modal-field"><label>Activity</label>
        <select id="edit-activity">
          <option value="">—</option>
          <option value="sedentary">Sedentary</option>
          <option value="light">Lightly Active</option>
          <option value="moderate">Moderately Active</option>
          <option value="active">Very Active</option>
        </select>
      </div>
    </div>
    <div class="modal-field"><label>Programme</label>
      <select id="edit-interest">
        <option value="">—</option>
        <option value="monthly">Monthly — ₹8,000</option>
        <option value="quarterly">Quarterly — ₹21,000</option>
        <option value="half-yearly">Half Yearly — ₹38,000</option>
        <option value="annual">Annual — ₹71,000</option>
        <option value="just-curious">Not sure yet</option>
      </select>
    </div>
    <div class="modal-field"><label>Goal</label><textarea id="edit-message"></textarea></div>
    <div class="modal-actions">
      <button class="action-btn" onclick="closeModal('editModal')">Cancel</button>
      <button class="action-btn btn-reply" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
  const API = 'https://getfitwithadin.onrender.com';

  const PROGRAMME_LABELS = {
    'monthly':      'Monthly — ₹8,000',
    'quarterly':    'Quarterly — ₹21,000',
    'half-yearly':  'Half Yearly — ₹38,000',
    'annual':       'Annual — ₹71,000',
    'just-curious': 'Not sure yet'
  };
  const ACTIVITY_LABELS = {
    'sedentary': 'Sedentary',
    'light':     'Lightly Active',
    'moderate':  'Moderately Active',
    'active':    'Very Active'
  };

  let allSubmissions = [];
  let editingId = null;

  fetch(`${API}/api/submissions`)
    .then(r => {
      if (r.status === 401) { window.location.href = `${API}/auth/login`; return; }
      return r.json();
    })
    .then(data => {
      if (!data) return;
      allSubmissions = data;
      renderStats();
      renderSubmissions();
    })
    .catch(() => {
      document.getElementById('listContainer').innerHTML =
        '<div class="empty"><div class="empty-icon">⚠️</div>Failed to load submissions.</div>';
    });

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })
      + ' · ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  }

  function renderStats() {
    const total = allSubmissions.length;
    const thisMonth = allSubmissions.filter(s => {
      const d = new Date(s.timestamp); const now = new Date();
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }).length;
    const latest = total ? formatDate(allSubmissions[0].timestamp) : '—';
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card"><div class="num">${total}</div><div class="lbl">Total Inquiries</div></div>
      <div class="stat-card"><div class="num">${thisMonth}</div><div class="lbl">This Month</div></div>
      <div class="stat-card"><div class="num" style="font-size:1rem;padding-top:4px;">${latest}</div><div class="lbl">Latest Submission</div></div>
    `;
    document.getElementById('statsBar').textContent = `${total} total · ${thisMonth} this month`;
  }

  function renderSubmissions() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allSubmissions.filter(s =>
      !q || s.name.toLowerCase().includes(q) || s.email.toLowerCase().includes(q) ||
      s.message.toLowerCase().includes(q) || (PROGRAMME_LABELS[s.interest] || '').toLowerCase().includes(q)
    );
    const container = document.getElementById('listContainer');
    if (!filtered.length) {
      container.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>${q ? 'No matches found.' : 'No submissions yet.'}</div>`;
      return;
    }
    container.innerHTML = filtered.map(s => {
      const fields = [
        s.weight   && `<div class="card-field"><div class="field-label">Weight</div><div class="field-value">${s.weight} kg</div></div>`,
        s.height   && `<div class="card-field"><div class="field-label">Height</div><div class="field-value">${s.height} cm</div></div>`,
        s.age      && `<div class="card-field"><div class="field-label">Age</div><div class="field-value">${s.age}</div></div>`,
        s.activity && `<div class="card-field"><div class="field-label">Activity</div><div class="field-value">${ACTIVITY_LABELS[s.activity] || s.activity}</div></div>`,
      ].filter(Boolean).join('');
      return `
        <div class="submission-card" id="card-${s.id}">
          <div class="card-top">
            <div>
              <div class="card-name">${s.name}
                ${s.interest ? `<span class="badge-programme">${PROGRAMME_LABELS[s.interest] || s.interest}</span>` : ''}
              </div>
              <div class="card-email">${s.email}</div>
            </div>
            <div class="card-time">${formatDate(s.timestamp)}</div>
          </div>
          ${fields ? `<div class="card-fields">${fields}</div>` : ''}
          ${s.message ? `<div class="card-message"><div class="msg-label">Goal</div>${s.message}</div>` : ''}
          <div class="card-actions">
            <a class="action-btn btn-reply" href="mailto:${s.email}?subject=Re: Coaching Inquiry&body=Hi ${s.name},%0A%0AThanks for reaching out!">Reply via Email</a>
            <a class="action-btn btn-wa" href="https://wa.me/91${s.phone || ''}?text=${encodeURIComponent(`Hi ${s.name}, thanks for your inquiry on GetFitWithAdin.com!`)}" target="_blank">WhatsApp</a>
            <button class="action-btn btn-view" onclick="openPreview(${s.id})">👁 View</button>
            <button class="action-btn btn-edit" onclick="openEdit(${s.id})">✏️ Edit</button>
            <button class="action-btn btn-delete" onclick="deleteSubmission(${s.id})">🗑 Delete</button>
          </div>
        </div>`;
    }).join('');
  }

  // ---------- Preview ----------
  function openPreview(id) {
    const s = allSubmissions.find(x => x.id === id);
    if (!s) return;
    const waMsg = encodeURIComponent(`Hi ${s.name}, thanks for your inquiry on GetFitWithAdin.com! I've received your details and will get back to you shortly.`);
    document.getElementById('previewContent').innerHTML = `
      <div class="modal-field"><label>Name</label><div class="view-value">${s.name}</div></div>
      <div class="modal-field"><label>Email</label><div class="view-value">${s.email}</div></div>
      ${s.weight ? `<div class="modal-field"><label>Weight</label><div class="view-value">${s.weight} kg</div></div>` : ''}
      ${s.height ? `<div class="modal-field"><label>Height</label><div class="view-value">${s.height} cm</div></div>` : ''}
      ${s.age    ? `<div class="modal-field"><label>Age</label><div class="view-value">${s.age}</div></div>` : ''}
      ${s.activity ? `<div class="modal-field"><label>Activity Level</label><div class="view-value">${ACTIVITY_LABELS[s.activity] || s.activity}</div></div>` : ''}
      ${s.interest ? `<div class="modal-field"><label>Programme</label><div class="view-value">${PROGRAMME_LABELS[s.interest] || s.interest}</div></div>` : ''}
      ${s.message  ? `<div class="modal-field"><label>Goal</label><div class="view-value">${s.message}</div></div>` : ''}
      <div class="modal-field"><label>Submitted</label><div class="view-value">${formatDate(s.timestamp)}</div></div>
    `;
    document.getElementById('previewReply').href = `mailto:${s.email}?subject=Re: Coaching Inquiry&body=Hi ${s.name},%0A%0AThanks for reaching out!`;
    document.getElementById('previewWa').href = `https://wa.me/91${s.phone || ''}?text=${waMsg}`;
    document.getElementById('previewModal').classList.add('active');
  }

  // ---------- Edit ----------
  function openEdit(id) {
    const s = allSubmissions.find(x => x.id === id);
    if (!s) return;
    editingId = id;
    document.getElementById('edit-name').value     = s.name     || '';
    document.getElementById('edit-email').value    = s.email    || '';
    document.getElementById('edit-weight').value   = s.weight   || '';
    document.getElementById('edit-height').value   = s.height   || '';
    document.getElementById('edit-age').value      = s.age      || '';
    document.getElementById('edit-activity').value = s.activity || '';
    document.getElementById('edit-interest').value = s.interest || '';
    document.getElementById('edit-message').value  = s.message  || '';
    document.getElementById('editModal').classList.add('active');
  }

  function saveEdit() {
    const updates = {
      name:     document.getElementById('edit-name').value.trim(),
      email:    document.getElementById('edit-email').value.trim(),
      weight:   document.getElementById('edit-weight').value.trim(),
      height:   document.getElementById('edit-height').value.trim(),
      age:      document.getElementById('edit-age').value.trim(),
      activity: document.getElementById('edit-activity').value,
      interest: document.getElementById('edit-interest').value,
      message:  document.getElementById('edit-message').value.trim(),
    };
    fetch(`${API}/api/submissions/${editingId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    }).then(r => r.json()).then(() => {
      allSubmissions = allSubmissions.map(s => s.id === editingId ? { ...s, ...updates } : s);
      closeModal('editModal');
      renderSubmissions();
    });
  }

  // ---------- Delete ----------
  function deleteSubmission(id) {
    if (!confirm('Delete this submission? This cannot be undone.')) return;
    fetch(`${API}/api/submissions/${id}`, { method: 'DELETE' })
      .then(r => r.json())
      .then(() => {
        allSubmissions = allSubmissions.filter(s => s.id !== id);
        renderStats();
        renderSubmissions();
      });
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('active');
  }

  // Close modal on overlay click
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('active');
    });
  });

  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
  });
</script>
</body>
</html>

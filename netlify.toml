[build]
  publish = "."
  functions = "netlify/functions"

# Route /api/contact to the Netlify Function
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

# Protect admin page (redirect to 404 on live site — use locally for inbox)
[[redirects]]
  from = "/admin"
  to = "/404.html"
  status = 404

# Block direct access to sensitive files
[[redirects]]
  from = "/*.json"
  to = "/404.html"
  status = 404

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; media-src 'self'; connect-src 'self' https://getfitwithadin.onrender.com https://www.google-analytics.com https://docs.google.com https://analytics.google.com; frame-src https://calendly.com; object-src 'none'; base-uri 'self'; form-action 'self' https://docs.google.com;"
